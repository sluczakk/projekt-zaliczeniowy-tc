server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API proxy do backendu
  location /api/ {
    proxy_pass https://tc-dbplus-backend.internal.gentlewave-6e79baa5.polandcentral.azurecontainerapps.io/;

    proxy_http_version 1.1;
    proxy_set_header Host tc-dbplus-backend.internal.gentlewave-6e79baa5.polandcentral.azurecontainerapps.io;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}