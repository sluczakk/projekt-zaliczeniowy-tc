name: Trigger auto deployment for tc-dbplus-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/tc-dbplus-backend-AutoDeployTrigger-955c78ea-47a7-4ecf-8e13-be83398b0e0e.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TCDBPLUSBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TCDBPLUSBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TCDBPLUSBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: projekttcacr.azurecr.io
          registryUsername: ${{ secrets.TCDBPLUSBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.TCDBPLUSBACKEND_REGISTRY_PASSWORD }}
          containerAppName: tc-dbplus-backend
          resourceGroup: resourcegroup1
          imageToBuild: projekttcacr.azurecr.io/tc-dbplus-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


