name: Build and deploy frontend/backend containers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR: projekttcacr.azurecr.io
  FRONTEND_IMAGE: tccrud-frontend
  BACKEND_IMAGE: tccrud-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR }}
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38BF90053ED74B51947F05E1E44357F3 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E6D7FBB655324FC591A6651B92361755 }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.ACR }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ACR }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.ACR }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ACR }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
    
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_59737136FBF146C395A77474FF5F3A15 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2D08C5D9E13B4A498B38041A5EA4A739 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AA69E80A2992472DB5E7D7E8FD7B142E }}

      - name: Deploy frontend container app
        uses: azure/container-apps-deploy-action@v1
        with:
          appName: tc-dbplus-frontend
          resourceGroup: resourcegroup1
          imageToDeploy: ${{ env.ACR }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}