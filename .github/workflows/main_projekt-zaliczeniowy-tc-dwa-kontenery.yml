name: Build and deploy frontend/backend containers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR: projekttcacr.azurecr.io
  FRONTEND_IMAGE: tccrud-frontend
  BACKEND_IMAGE: tccrud-backend

  RESOURCE_GROUP: resourcegroup1
  FRONTEND_CONTAINER_APP: tc-dbplus-frontend
  BACKEND_CONTAINER_APP: tc-dbplus-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR }}
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38BF90053ED74B51947F05E1E44357F3 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E6D7FBB655324FC591A6651B92361755 }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.ACR }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ACR }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.ACR }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ACR }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9B8C3FBDD77F4B03A03161A69BE785F9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CB5D737213554238BDB288BBA04FAD2D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A467FAC0E7804D0A965EC2F126C000A5 }}

      - name: Deploy frontend Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: tc-dbplus-frontend
          resourceGroup: resourcegroup1
          imageToDeploy: ${{ env.ACR }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: tc-dbplus-backend
          resourceGroup: resourcegroup1
          imageToDeploy: ${{ env.ACR }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}