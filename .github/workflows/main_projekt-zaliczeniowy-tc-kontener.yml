# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - projekt-zaliczeniowy-tc-kontener

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: projekttcacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38BF90053ED74B51947F05E1E44357F3 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E6D7FBB655324FC591A6651B92361755 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: projekttcacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38BF90053ED74B51947F05E1E44357F3 }}/tccruddapp:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_59737136FBF146C395A77474FF5F3A15 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2D08C5D9E13B4A498B38041A5EA4A739 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AA69E80A2992472DB5E7D7E8FD7B142E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'projekt-zaliczeniowy-tc-kontener'
          slot-name: 'Production'
          images: 'projekttcacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_38BF90053ED74B51947F05E1E44357F3 }}/tccruddapp:${{ github.sha }}'
          